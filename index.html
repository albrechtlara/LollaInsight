<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lolla Insights 2026</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@400;700&family=DM+Sans:wght@400;900&display=swap" rel="stylesheet">
    
    <style>
        body { background-color: #0a0a0a; color: white; margin: 0; padding: 0; min-height: 100vh; font-family: 'DM Sans', sans-serif; }
        .serif { font-family: 'Instrument Serif', serif; }
        .mono { font-family: 'Geist Mono', monospace; }
        #root { min-height: 100vh; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { 
            Users, TrendingUp, HeartPulse, Music, 
            Zap, Sparkles, CreditCard, ChevronRight 
        } = lucide;

        function App() {
            const [mounted, setMounted] = useState(false);
            useEffect(() => { setMounted(true); }, []);

            return (
                <div className={`transition-opacity duration-1000 ${mounted ? 'opacity-100' : 'opacity-0'}`}>
                    <nav className="p-6 border-b border-white/10 flex justify-between items-center sticky top-0 bg-[#0a0a0a]/80 backdrop-blur-md z-50">
                        <div className="flex items-center gap-3">
                            <div className="w-8 h-8 bg-gradient-to-br from-pink-500 to-purple-600 rounded-lg flex items-center justify-center serif italic text-xl">L</div>
                            <span className="mono font-bold text-xs tracking-tighter">LOLLA INSIGHTS 2026</span>
                        </div>
                    </nav>

                    <main className="max-w-5xl mx-auto px-6 py-20 text-center">
                        <div className="inline-flex items-center gap-2 px-4 py-1 rounded-full bg-white/5 border border-white/10 mono text-[10px] font-bold mb-8">
                            <Zap className="w-3 h-3 text-yellow-400" /> MONITORAMENTO 2026
                        </div>
                        <h1 className="text-6xl md:text-8xl font-black leading-[0.85] mb-10">
                            O FESTIVAL <br/> NÃO ACABA <span className="serif italic font-normal text-pink-500">no domingo</span>
                        </h1>
                        
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mt-20 text-left">
                            {[
                                { label: 'Menções', val: '140k+', color: '#ec4899', icon: <Users/> },
                                { label: 'Positivo', val: '40%', color: '#34d399', icon: <TrendingUp/> },
                                { label: 'Saúde', val: '919', color: '#22d3ee', icon: <HeartPulse/> },
                                { label: 'Pico', val: '966', color: '#facc15', icon: <Music/> }
                            ].map((s, i) => (
                                <div key={i} className="bg-white/5 border border-white/10 p-8 rounded-3xl">
                                    <div style={{color: s.color}} className="mb-4">{s.icon}</div>
                                    <div className="text-4xl font-black mb-1">{s.val}</div>
                                    <div className="text-[10px] font-bold text-white/40 uppercase tracking-widest">{s.label}</div>
                                </div>
                            ))}
                        </div>
                    </main>

                    <footer className="py-20 border-t border-white/5 text-center text-white/20 mono text-[10px] tracking-widest">
                        ESTUDO DE CASO · SOCIAL LISTENING
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
