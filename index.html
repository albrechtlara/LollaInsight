<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lolla Insights 2026</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@400;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;0,9..40,900;1,9..40,400;1,9..40,500&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0a0a0a; color: white; margin: 0; padding: 0; overflow-x: hidden; }
        .serif { font-family: 'Instrument Serif', serif; }
        .mono { font-family: 'Geist Mono', monospace; }
        .sans { font-family: 'DM Sans', sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { 
          BarChart3, TrendingUp, Users, Zap, HeartPulse, Music, 
          CreditCard, Sparkles, Info, ChevronRight, ChevronDown, 
          Monitor, ArrowLeft, Database, Calendar, Filter, Layers, 
          Search, X, ExternalLink 
        } = lucide;

        const mono = { fontFamily: "'Geist Mono', monospace" };
        const serif = { fontFamily: "'Instrument Serif', serif" };
        const sans = { fontFamily: "'DM Sans', sans-serif" };

        const YouScanLink = ({ children, style: extraStyle }) => (
          <a href="https://youscan.io/" target="_blank" rel="noopener noreferrer"
            style={{ color: '#fff', fontWeight: 700, textDecoration: 'none', borderBottom: '1px solid rgba(255,255,255,0.3)', ...extraStyle }}
          >{children || 'YouScan'}</a>
        );

        const App = () => {
          const [currentView, setCurrentView] = useState('home');
          const [activeBrand, setActiveBrand] = useState(null);
          const [expandedStat, setExpandedStat] = useState(null);
          const [mounted, setMounted] = useState(false);

          useEffect(() => { setMounted(true); }, []);

          const stats = [
            { id: 'total', label: 'Menções Totais', value: '140k+', sub: 'Legado Consolidado', icon: <Users />, accent: '#ec4899', detail: { title: 'Semana 3: O Festival Que Não Para', insight: 'Duas semanas após o encerramento, o Lollapalooza 2026 ainda gera quase 4 mil menções diárias.' } },
            { id: 'sentimento', label: 'Sentimento Positivo', value: '40%', sub: 'Nostalgia', icon: <TrendingUp />, accent: '#34d399', detail: { title: 'Mapa de Sentimentos', insight: 'O positivo é puxado por nostalgia e euforia dos fandoms.' } },
            { id: 'saude', label: 'Macrotema Saúde', value: '919', sub: 'Exaustão física', icon: <HeartPulse />, accent: '#22d3ee', detail: { title: 'Saúde & Bem-estar', insight: 'As 919 menções são 100% Pain — mas a dor não cancela a positividade.' } },
            { id: 'chappell', label: 'Pico Chappell Roan', value: '966', sub: 'Gatilho dia 02/04', icon: <Music />, accent: '#facc15', detail: { title: 'Gatilhos Externos', insight: 'A conversa pós-festival não decai linearmente.' } }
          ];

          const brandStrategies = [
            { id: 'risque', name: 'Risqué', category: 'Beleza & Estilo', icon: <Sparkles />, color: '#db2777', action: 'Lançar tutoriais "Daily Festival Look" e coleções inspiradas nos maiores fandoms.', metric: 'Forte presença em UGC tardio.' },
            { id: 'budweiser', name: 'Budweiser', category: 'Cultura Pop', icon: <Music />, color: '#dc2626', action: 'Atuar como curadora da "ressaca cultural". Promover watch parties digitais.', metric: '338 menções Pain.' },
            { id: 'bradesco', name: 'Bradesco', category: 'Serviços Financeiros', icon: <CreditCard />, color: '#2563eb', action: 'Transformar a dor do gasto em planejamento e benefícios exclusivos.', metric: '53 menções em contexto pragmático.' }
          ];

          return (
            <div className={`min-h-screen bg-[#0a0a0a] text-white sans transition-opacity duration-1000 ${mounted ? 'opacity-100' : 'opacity-0'}`}>
              <nav className="fixed top-0 inset-x-0 z-50 bg-[#0a0a0a]/80 backdrop-blur-xl border-b border-white/5 p-4">
                <div className="max-w-4xl mx-auto flex justify-between items-center">
                  <div className="flex items-center gap-2 cursor-pointer" onClick={() => setCurrentView('home')}>
                    <div className="w-8 h-8 bg-gradient-to-br from-pink-500 to-purple-600 rounded-lg flex items-center justify-center serif italic text-xl">L</div>
                    <span className="mono font-bold text-[10px] tracking-widest uppercase">Lolla Insights 2026</span>
                  </div>
                  <div className="flex gap-8">
                    <button onClick={() => setCurrentView('home')} className={`mono text-[10px] font-bold uppercase ${currentView === 'home' ? 'text-white' : 'text-white/30'}`}>Home</button>
                    <button onClick={() => setCurrentView('methodology')} className={`mono text-[10px] font-bold uppercase ${currentView === 'methodology' ? 'text-white' : 'text-white/30'}`}>Metodologia</button>
                  </div>
                </div>
              </nav>

              <div className="pt-24 pb-20 px-6 max-w-4xl mx-auto">
                {currentView === 'home' ? (
                  <>
                    <header class="text-center mb-20">
                      <div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-white/5 border border-white/10 mono text-[10px] font-bold text-white/70 mb-8">
                        <Zap className="w-3 h-3 text-yellow-400" /> ESTUDO DE CASO: LOLLAPALOOZA 2026
                      </div>
                      <h1 class="sans font-black text-6xl md:text-7xl leading-[0.9] mb-8 uppercase">
                        O Festival Não Acaba <span class="serif italic font-normal text-pink-500 normal-case">no domingo</span>
                      </h1>
                      <p class="sans text-lg text-white/40 max-w-lg mx-auto">Como o Social Listening via YouScan transforma o legado digital em oportunidade estratégica.</p>
                    </header>

                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-20">
                      {stats.map(s => (
                        <div key={s.id} class="bg-white/5 border border-white/10 p-6 rounded-3xl hover:bg-white/10 transition-all cursor-pointer">
                          <div style={{color: s.accent}} className="mb-4">{s.icon}</div>
                          <div class="text-4xl font-black mb-1">{s.value}</div>
                          <div class="text-[10px] font-bold text-white/30 uppercase tracking-widest">{s.label}</div>
                        </div>
                      ))}
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                      {brandStrategies.map(b => (
                        <div key={b.id} class="bg-white/5 border border-white/10 p-8 rounded-[40px] flex flex-col justify-between min-h-[350px]">
                          <div>
                            <div class="w-12 h-12 rounded-2xl flex items-center justify-center mb-6" style={{backgroundColor: b.color}}>{b.icon}</div>
                            <h3 class="text-2xl font-black mb-1">{b.name}</h3>
                            <p class="text-xs text-white/40 uppercase tracking-widest mb-6">{b.category}</p>
                            <p class="text-sm italic text-white/60 mb-4">"{b.action}"</p>
                          </div>
                          <div class="text-[10px] font-bold text-pink-500 uppercase tracking-widest flex items-center gap-2">Ver Estratégia <ChevronRight class="w-3 h-3"/></div>
                        </div>
                      ))}
                    </div>
                  </>
                ) : (
                  <div class="animate-in fade-in slide-in-from-bottom-4 duration-700">
                    <h2 class="serif italic text-5xl mb-12">Metodologia</h2>
                    <div class="bg-white/5 border border-white/10 p-10 rounded-[40px] space-y-6">
                      <p class="sans text-xl text-white/50 leading-relaxed italic">"Análise baseada na consolidação de 16.413 menções coletadas via YouScan no período tardio do pós-festival (Semana 3)."</p>
                      <div class="grid grid-cols-2 gap-4 pt-6">
                         <div><p class="mono text-[10px] text-white/30 uppercase">Período</p><p class="font-bold">01 a 04/04/2026</p></div>
                         <div><p class="mono text-[10px] text-white/30 uppercase">Ferramenta</p><p class="font-bold">YouScan AI</p></div>
                      </div>
                    </div>
                  </div>
                )}
              </div>

              <footer class="border-t border-white/5 py-20 text-center">
                <div class="flex flex-col items-center gap-4">
                  <Monitor class="text-white/20" />
                  <p class="mono text-[10px] text-white/20 tracking-[0.3em] uppercase">© 2026 · Powered by YouScan</p>
                </div>
              </footer>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
